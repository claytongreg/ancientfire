<style type="text/tailwindcss">
  @theme {
    --color-background: hsl(24 8% 10%);
    --color-foreground: hsl(0 0% 100%);
    --color-muted-foreground: hsl(240 4% 66%);
    --color-primary: hsl(0 0% 100%);

    --color-secondary: hsl(0 0% 10%);
    --color-muted: hsl(0 0% 10%);

  }
</style>
<style>
  :root {
    --background: 24 8% 10%;
    --foreground: 0 0% 100%;
    --muted-foreground: 240 4% 66%;
    --primary: 0 0% 100%;
    --primary-foreground: 0 0% 4%;
    --secondary: 0 0% 10%;
    --muted: 0 0% 10%;
    --accent: 0 0% 10%;
    --border: 0 0% 18%;
    --input: 0 0% 18%;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'Inter', sans-serif;
  }

  html, body {
    background-color: hsl(var(--background));
    color: hsl(var(--foreground));
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Video placeholder — replace with your <video> element */
  .video-placeholder {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    background:
      radial-gradient(ellipse at 30% 20%, hsla(201, 80%, 25%, 0.8) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 80%, hsla(210, 60%, 18%, 0.9) 0%, transparent 60%),
      linear-gradient(180deg, hsl(24 8% 8%) 0%, hsl(24 8% 10%) 50%, hsl(201 100% 8%) 100%);
  }
  .video-placeholder::after {
    content: 'video will be added here';
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  /* Liquid Glass */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
    cursor: pointer;
    color: hsl(0 0% 100%);
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass:hover {
    transform: scale(1.03);
  }

  /* Animations */
  @keyframes fade-rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-rise         { animation: fade-rise 0.8s ease-out both; }
  .animate-fade-rise-delay   { animation: fade-rise 0.8s ease-out 0.2s both; }
  .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }

  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .animate-fade-in { animation: fade-in 1.2s ease-out both; }

  .font-display { font-family: 'Instrument Serif', serif; }
  .font-body    { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="min-h-screen overflow-x-hidden">

    </nav>

    <!-- HERO -->
    <section class="relative z-10 flex flex-col items-center justify-center text-center px-6 pt-32 pb-40 py-[90px]">
      <h1
        class="animate-fade-rise font-normal text-5xl sm:text-7xl md:text-8xl max-w-7xl text-foreground"

           style="letter-spacing: 0.32em;">

        A living dojo on Salt Spring Island — breath, fight, and fire held by Amber &amp; Jesse Blue, for those ready to meet themselves.
      </p>

      <a href="/offerings" class="animate-fade-rise-delay-2 liquid-glass rounded-full px-14 py-5 text-base text-foreground mt-12 inline-block" style="text-decoration: none;">
        Begin Journey

    </section>

  </div>

</body>
